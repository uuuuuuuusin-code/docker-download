name: Download Docker Image (ARM64)
on: workflow_dispatch # 手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save ARM64 Image
        run: |
          # 使用 --platform linux/arm64 指定架构
          docker pull --platform linux/arm64 calciumion/new-api:latest
          
          # 验证架构是否正确 (可选)
          docker inspect calciumion/new-api:latest | grep Architecture
          
          # 导出镜像
          docker save calciumion/new-api:latest -o new-api-arm64.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-arm64-image
          path: new-api-arm64.tar
